<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Kanban</title>
  <link rel="stylesheet" href="/css/kanban.css">
  <link rel="stylesheet" href="/css/detail.css">
</head>
<body>
  <header class="header">
    <h1 class="header__title">Flow Kanban</h1>
    <div class="runner-controls" id="runner-controls">
      <div class="runner-status" id="runner-status">
        <span class="runner-dot" id="runner-dot"></span>
        <span class="runner-label" id="runner-label">stopped</span>
        <span class="runner-spec" id="runner-spec"></span>
      </div>
      <div class="runner-buttons">
        <button class="runner-btn runner-btn--start" id="runner-start" title="Start">Start</button>
        <button class="runner-btn runner-btn--schedule" id="runner-schedule" title="현재 작업 완료 후 정지">Stop</button>
        <button class="runner-btn runner-btn--stop" id="runner-force-stop" title="즉시 정지">Force</button>
      </div>
    </div>
    <div class="header__actions">
      <select id="project-filter" class="project-filter">
        <option value="">전체 프로젝트</option>
      </select>
      <button class="runner-btn" id="add-project" title="프로젝트 추가">+ Project</button>
      <input type="text" id="search" class="search-input" placeholder="스펙 검색...">
      <span id="spec-count" class="spec-count"></span>
      <button class="runner-btn" id="seed-demo" title="데모 데이터 추가">Demo</button>
    </div>
  </header>

  <main class="board" id="board"></main>

  <!-- Detail Panel -->
  <div class="detail-overlay" id="detail-overlay">
    <div class="detail-panel" id="detail-panel">
      <button class="detail-close" id="detail-close">&times;</button>
      <div id="detail-content"></div>
    </div>
  </div>

  <!-- Add Project Modal -->
  <div class="modal-overlay" id="add-project-overlay">
    <div class="modal-panel">
      <div class="modal-header">
        <h2>프로젝트 추가</h2>
        <button class="detail-close" id="add-project-close">&times;</button>
      </div>
      <div class="modal-body">
        <label class="modal-label" for="add-project-path">Git 저장소 경로</label>
        <input type="text" id="add-project-path" class="modal-input" placeholder="D:\Projects\my-app">
        <p class="modal-hint">.git 폴더가 있는 저장소 루트 경로를 입력하세요.</p>
        <label class="modal-label" for="add-project-name">프로젝트 이름 (선택)</label>
        <input type="text" id="add-project-name" class="modal-input" placeholder="폴더 이름이 기본값">
        <label class="modal-label" for="add-project-branch">기본 브랜치 (선택)</label>
        <input type="text" id="add-project-branch" class="modal-input" placeholder="main">
      </div>
      <div class="modal-footer">
        <button class="runner-btn" id="add-project-cancel">취소</button>
        <button class="runner-btn runner-btn--start" id="add-project-submit">추가</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/constants.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/card.js"></script>
  <script src="/js/detail.js"></script>
  <script src="/js/dragdrop.js"></script>
  <script src="/js/board.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
