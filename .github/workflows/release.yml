name: Release Flow Prompts

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Bump VERSION
        id: bump
        run: |
          VERSION=$(tr -d '\n\r ' < VERSION)
          if ! echo "$VERSION" | grep -E '^([0-9]+)\.([0-9]+)\.([0-9]+)$' > /dev/null; then
            echo "VERSION is not SemVer: $VERSION"
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "$NEW_VERSION" > VERSION
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $NEW_VERSION"

      - name: Commit and tag version
        run: |
          git add VERSION
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }} [skip release]"
          git tag -a "v${{ steps.bump.outputs.version }}" -m "Release v${{ steps.bump.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Copy VERSION to .flow
        run: |
          cp VERSION .flow/version.txt

      - name: Build Flow CLI (single-file, multi-platform)
        run: |
          VER=${{ steps.bump.outputs.version }}
          CSPROJ=tools/flow-cli/flow-cli.csproj
          PROPS="-p:Version=$VER -p:AssemblyVersion=$VER -p:FileVersion=$VER"

          dotnet publish $CSPROJ -c Release -r win-x64    --self-contained -o build-win       $PROPS
          dotnet publish $CSPROJ -c Release -r linux-x64  --self-contained -o build-linux     $PROPS
          dotnet publish $CSPROJ -c Release -r osx-arm64  --self-contained -o build-osx-arm64 $PROPS
          dotnet publish $CSPROJ -c Release -r osx-x64    --self-contained -o build-osx-x64   $PROPS

      - name: Build Flow Extension (.vsix)
        run: |
          cd tools/flow-ext
          # package.json 버전 동기화
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.bump.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm ci
          npm run build
          # LICENSE 복사
          cp ../../LICENSE ./LICENSE 2>/dev/null || true
          npx vsce package --no-dependencies --allow-missing-repository
          # .vsix 파일을 프로젝트 루트로 이동
          mv *.vsix ../../flow-ext-${{ steps.bump.outputs.version }}.vsix

      - name: Create zip archive
        run: |
          mkdir -p temp-release/.flow/bin
          mkdir -p temp-release/.github/skills
          cp -r .flow temp-release/
          find temp-release/.flow -type f \( -name "*.pdb" -o -name "*.db" \) -delete
          # 런타임 생성 파일 제거 (설치 대상 아님)
          rm -rf temp-release/.flow/logs
          rm -rf temp-release/.flow/spec-cache
          rm -rf temp-release/.flow/worktrees
          rm -rf temp-release/.flow/review
          rm -f  temp-release/.flow/runner.pid
          rm -f  temp-release/.flow/spec-state.json
          rm -f  temp-release/.flow/flow-ext.reload.signal
          echo '{}' > temp-release/.flow/config.json

          # Flow CLI 단일 파일 바이너리
          cp build-win/flow.exe        temp-release/.flow/bin/flow.exe
          cp build-linux/flow          temp-release/.flow/bin/flow-linux
          cp build-osx-arm64/flow      temp-release/.flow/bin/flow-osx-arm64
          cp build-osx-x64/flow        temp-release/.flow/bin/flow-osx-x64
          chmod +x temp-release/.flow/bin/flow-linux
          chmod +x temp-release/.flow/bin/flow-osx-arm64
          chmod +x temp-release/.flow/bin/flow-osx-x64

          # VS Code 확장 (.vsix)
          cp flow-ext-${{ steps.bump.outputs.version }}.vsix temp-release/.flow/

          # E2E 테스트
          cp -r tools/e2e-test temp-release/.flow/e2e-test
          find temp-release/.flow/e2e-test -type d -name "__pycache__" -prune -exec rm -rf {} +
          find temp-release/.flow/e2e-test -type f -name "*.pyc" -delete

          # .github/agents
          if [ -d .github/agents ]; then
            cp -r .github/agents temp-release/.github/
          fi

          # .github/skills 전체 포함 (flow-*, skill-creator, skill-downloader)
          for skill_dir in .github/skills/*/; do
            skill_name=$(basename "$skill_dir")
            if [ -f "$skill_dir/SKILL.md" ]; then
              cp -r "$skill_dir" "temp-release/.github/skills/$skill_name"
            fi
          done

          # 래퍼 스크립트
          cp flow.ps1 temp-release/
          cp flow temp-release/
          chmod +x temp-release/flow

          cd temp-release
          zip -r ../flow.zip .flow/ .github/ flow.ps1 flow
          cd ..
          rm -rf temp-release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: Flow Prompts v${{ steps.bump.outputs.version }}
          body: |
            ## Flow v${{ steps.bump.outputs.version }}

            ### 설치 방법

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
            ```

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            > VS Code 확장은 설치 스크립트가 자동으로 설치합니다.
            > 수동 설치: 위 Assets에서 `flow-ext-*.vsix` 다운로드 → VS Code Extensions 탭 → `Install from VSIX...`

            ### 업데이트 방법

            **Windows:**
            ```powershell
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/update.ps1 | iex
            ```

            **macOS / Linux:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/update.sh | bash
            ```

            ### 포함된 구성 요소
            - `flow.exe` / `flow-linux` / `flow-osx-arm64` / `flow-osx-x64` — Flow CLI
            - `flow-ext-*.vsix` — VS Code 확장 (스펙 트리뷰, 칸반, 그래프)
            - `.github/skills/flow-spec-graph` — 스펙 그래프 관리 스킬
            - `.github/skills/flow-spec-create` — 스펙 생성 마법사 스킬
            - `.github/skills/flow-build` — 빌드 통합 스킬
            - `.github/skills/flow-rag` — RAG 데이터베이스 스킬
            - `.github/skills/flow-e2e-test` — E2E 테스트 스킬
            - `.github/skills/skill-creator` — 커스텀 스킬 생성 도구
            - `.github/agents/` — 스펙 플래너 에이전트

          files: |
            flow.zip
            flow-ext-${{ steps.bump.outputs.version }}.vsix
          draft: false
          prerelease: false
